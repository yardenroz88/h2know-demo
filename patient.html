<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H2Know - Patient Webapp</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --burgundy: #6b1d1d;
            --bg-banana: #fffbe6; 
            --text-dark: #2c2525;
            --text-muted: #7a7070;
            --success-color: #2e7d32;
            --warning-color: #f57c00; 
            --danger-color: #a62626; 
            --card-shadow: 0 4px 20px rgba(107, 29, 29, 0.03);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 24px 16px;
            background-color: var(--bg-banana);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            color: var(--burgundy);
            letter-spacing: -0.5px;
        }

        .status-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 8px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .status-connected { background-color: rgba(46, 125, 50, 0.08); color: var(--success-color); }
        .status-disconnected { background-color: rgba(0, 0, 0, 0.05); color: var(--text-muted); }

        .status-subtext {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .card {
            background: #ffffff;
            padding: 24px;
            border-radius: 24px;
            margin-bottom: 18px;
            box-shadow: var(--card-shadow);
        }

        .login-box .welcome-graphic {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box .input-wrapper {
            position: relative;
            margin: 14px 0;
        }

        .login-box .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .login-box input[type="text"], .login-box input[type="tel"] {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 1.5px solid #efebe4;
            background-color: var(--bg-banana);
            border-radius: 16px;
            font-size: 1rem;
            color: var(--text-dark);
            font-weight: 600;
            outline: none;
            transition: border-color 0.3s;
        }

        .login-box input[type="text"]:focus, .login-box input[type="tel"]:focus {
            border-color: var(--burgundy);
        }

        .auth-checkbox-container {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 20px 0 24px 0;
            text-align: left;
            padding: 2px;
        }

        .auth-checkbox-container input[type="checkbox"] {
            transform: scale(1.2);
            margin-top: 3px;
            cursor: pointer;
        }

        .auth-checkbox-label {
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-muted);
        }

        button.btn-primary {
            width: 100%;
            padding: 16px;
            background-color: var(--burgundy);
            color: var(--bg-banana);
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
        }

        .demo-actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-force {
            width: 100%;
            padding: 8px;
            background-color: transparent;
            color: var(--danger-color);
            border: 1.5px solid var(--danger-color);
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-force:active { background: rgba(166, 38, 38, 0.05); }

        .btn-resume {
            width: 100%;
            padding: 8px;
            background-color: transparent;
            color: var(--success-color);
            border: 1.5px solid var(--success-color);
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-resume:auto { background: rgba(46, 125, 50, 0.05); }

        .section-title {
            font-size: 1.15rem;
            font-weight: 800;
            margin: 0 0 2px 0;
            text-align: center;
            letter-spacing: -0.2px;
        }

        .live-timestamp {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            opacity: 0.75;
            text-align: center;
            margin-bottom: 18px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .metric-tile {
            background: #ffffff;
            padding: 20px 12px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #efebe4;
            box-shadow: var(--card-shadow);
        }

        .metric-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .metric-value-container {
            display: flex;
            align-items: baseline; 
            justify-content: center;
        }

        .metric-value {
            font-size: 2.9rem; 
            font-weight: 800;
            margin: 0;
            color: var(--text-dark);
            line-height: 1;
        }

        .metric-unit {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-left: 3px;
        }

        .metric-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 10px;
            padding: 3px 10px;
            border-radius: 30px;
        }
        
        .status-normal { background-color: rgba(46, 125, 50, 0.08); color: var(--success-color); }
        .status-elevated { background-color: rgba(245, 124, 0, 0.08); color: var(--warning-color); }
        .status-risk { background-color: rgba(198, 40, 40, 0.08); color: var(--danger-color); }

        .emergency-toolbar { margin-top: 20px; margin-bottom: 25px; }
        .emergency-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .btn-emergency-wrapper {
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .btn-emergency {
            background: #ffffff;
            color: var(--text-dark);
            padding: 12px 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(107, 29, 29, 0.02);
            text-decoration: none;
            border: 1.5px solid #efebe4;
            width: 100%;
            height: 85px; /* גובה קבוע ומאוזן לשני הכפתורים */
        }
        .btn-emergency .icon { font-size: 1.8rem; }
        
        .btn-update-phone {
            background: transparent;
            border: none;
            color: var(--burgundy);
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
            text-align: center;
            opacity: 0.8;
            position: absolute;
            bottom: -22px; /* ציוף מתחת לכפתור הראשי בלי לפגוע בגובה שלו */
            width: 100%;
        }
        .btn-update-phone:hover { opacity: 1; }

        .demo-control-panel { 
            background: #ffffff; 
            padding: 16px 20px; 
            border-radius: 24px; 
            margin-top: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid #efebe4;
        }
        .slider-group { margin-bottom: 12px; }
        .slider-group:last-child { margin-bottom: 0; }
        .slider-group label { display: flex; justify-content: space-between; font-weight: 700; font-size: 0.85rem; color: var(--text-muted); }
        .slider-group input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 10px; background: #ebdcb9; outline: none; margin: 6px 0; }
        .slider-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--burgundy); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>H2Know</h1>
        <div class="status-area">
            <div id="connectionStatus" class="status-badge status-disconnected">Patch Disconnected</div>
            <div id="connectionDuration" class="status-subtext" style="display: none;">Connected for 2m</div>
        </div>
    </header>

    <div id="loginScreen" class="card login-box">
        <div class="welcome-graphic">
            <span style="font-size: 2.5rem; display: block; margin-bottom: 8px;">👋</span>
            <h2 style="color: var(--burgundy); margin: 0; font-weight: 800; font-size: 1.5rem;">Welcome</h2>
            <p style="color: var(--text-muted); margin: 4px 0 0 0; font-weight: 600; font-size: 0.9rem;">Connect your protective smart patch</p>
        </div>
        
        <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="usernameInput" placeholder="Full Name">
        </div>
        <div class="input-wrapper">
            <span class="input-icon">🪪</span>
            <input type="text" id="idInput" placeholder="ID Number">
        </div>
        <div class="input-wrapper">
            <span class="input-icon">📞</span>
            <input type="tel" id="emergencyPhoneInput" placeholder="Emergency Contact Phone">
        </div>
        
        <div class="auth-checkbox-container">
            <input type="checkbox" id="hmoAuth" checked>
            <label for="hmoAuth" class="auth-checkbox-label">
                I authorize H2Know to securely sync my historical medical data from my HMO (קופת חולים)
            </label>
        </div>

        <button class="btn-primary" onclick="loginPatient()">Connect & Start</button>
    </div>

    <div id="dashboardScreen" style="display: none;">
        
        <h3 class="section-title">📊 Current Vital Signs</h3>
        <div class="live-timestamp" id="liveTimer">Last sync: just now</div>
        
        <div class="metrics-grid">
            <div class="metric-tile" id="tile-hr">
                <div class="metric-label">❤️ Heart Rate</div>
                <div class="metric-value-container">
                    <span class="metric-value" id="val-hr">--</span><span class="metric-unit">BPM</span>
                </div>
                <div class="metric-status status-normal" id="stat-hr">🟢 Normal</div>
            </div>
            <div class="metric-tile" id="tile-temp">
                <div class="metric-label">🌡️ Temperature</div>
                <div class="metric-value-container">
                    <span class="metric-value" id="val-temp">--</span><span class="metric-unit">°C</span>
                </div>
                <div class="metric-status status-normal" id="stat-temp">🟢 Normal</div>
            </div>
            <div class="metric-tile" id="tile-cond">
                <div class="metric-label">💧 Conductivity</div>
                <div class="metric-value-container">
                    <span class="metric-value" id="val-cond">--</span><span class="metric-unit">%</span>
